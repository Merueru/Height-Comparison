        // Zoom functions
        function zoomIn() {
            currentZoom += 0.1;
            applyZoom();
        }

        function zoomOut() {
            if (currentZoom > 0.5) {
                currentZoom -= 0.1;
                applyZoom();
            }
        }

        function zoomReset() {
            currentZoom = 1;
            applyZoom();
        }

        function applyZoom() {
            renderChart();
            const zoomButtons = document.querySelectorAll('.zoom-btn');
            if (zoomButtons.length >= 2) {
                zoomButtons[1].textContent = Math.round(currentZoom * 100) + '%';
            }
        }

        // Language change function
        function changeLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('selectedLanguage', lang);
            updateUIText();
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');
            const toggleBtn = document.getElementById('sidebarToggle');
            const icon = document.getElementById('toggleIcon');

            const isCollapsed = sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');

            if (isCollapsed) {
                toggleBtn.style.left = '0';
                icon.textContent = '❯';
            } else {
                toggleBtn.style.left = '325px';
                icon.textContent = '❮';
            }
            // Re-render chart to adjust to new width
            setTimeout(renderChart, 300);
        }

        function updateUIText() {
            const t = translations[currentLanguage];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (!t[key]) return;

                // Update Title (Tooltip) for controls
                if (el.hasAttribute('title') || el.id === 'languageSelector') {
                    el.title = t[key];
                }

                // Skip text replacement for buttons with specific fixed text or Select options
                if (el.classList.contains('zoom-btn') || el.tagName === 'SELECT') {
                    return;
                }

                    if (el.tagName === 'INPUT' && el.type === 'text') {
                        el.placeholder = t[key];
                    } else {
                        // ตรวจสอบและรักษาไอคอน SVG ไว้หากมี (ป้องกันไอคอนหายตอนเปลี่ยนภาษา)
                        const svg = el.querySelector('svg');
                        if (svg) {
                            el.innerHTML = '';
                            el.appendChild(svg);
                            el.appendChild(document.createTextNode(' ' + t[key]));
                        } else {
                            el.textContent = t[key];
                        }
                    }
            });
            const tipEl = document.getElementById('dragTip');
            if (tipEl) tipEl.innerHTML = '💡 ' + t.dragTip;
            // สั่งให้วาดรายการแถบซ้ายและกราฟใหม่เพื่อให้ภาษาอัปเดตตาม
            updateUI();
        }

        // Load saved language preference
        function loadLanguagePreference() {
            const saved = localStorage.getItem('selectedLanguage');
            if (saved) {
                currentLanguage = saved;
                document.getElementById('languageSelector').value = saved;
                updateUIText();
            }
        }

        // Initialize IndexedDB
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 3);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('settings')) {
                        database.createObjectStore('settings');
                    }
                    if (!database.objectStoreNames.contains('extraLines')) {
                        database.createObjectStore('extraLines', { keyPath: 'id' });
                    }
                };
            });
        }

        // Save characters to IndexedDB
        async function saveToIndexDB() {
            if (!db) return;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME, 'extraLines'], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const lineStore = transaction.objectStore('extraLines');
                
                store.clear();
                characters.forEach(char => {
                    store.add({...char});
                });

                lineStore.clear();
                extraLines.forEach(line => lineStore.add({...line}));
                
                transaction.onerror = () => reject(transaction.error);
                transaction.oncomplete = () => resolve();
            });
        }

        // Settings management in IndexedDB
        async function saveSettings(key, value) {
            if (!db) return;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['settings'], 'readwrite');
                const store = transaction.objectStore('settings');
                store.put(value, key);
                transaction.oncomplete = () => resolve();
            });
        }

        async function getSetting(key) {
            if (!db) return null;
            return new Promise((resolve) => {
                const transaction = db.transaction(['settings'], 'readonly');
                const store = transaction.objectStore('settings');
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve(null);
            });
        }

        async function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            await saveSettings('theme', newTheme);
        }

        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            const icon = document.getElementById('themeIcon');
            if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        // Load characters from IndexedDB
        async function loadFromIndexDB() {
            if (!db) return;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME, 'extraLines'], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const lineStore = transaction.objectStore('extraLines');
                
                const request = store.getAll();
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    characters = request.result.sort((a, b) => (a.order || 0) - (b.order || 0));
                    
                    const lineRequest = lineStore.getAll();
                    lineRequest.onsuccess = () => {
                        extraLines = lineRequest.result;
                        updateUI();
                        resolve();
                    };
                };
            });
        }

        // Initialize Sortable for drag-and-drop character list
        const listEl = document.getElementById('characterList');
        Sortable.create(listEl, {
            animation: 150,
            handle: '.drag-handle',
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                const movedItem = characters.splice(evt.oldIndex, 1)[0];
                characters.splice(evt.newIndex, 0, movedItem);
                // อัปเดตเลขลำดับใหม่ทั้งหมด
                characters.forEach((char, index) => {
                    char.order = index;
                });
                updateUI();
                saveToIndexDB();
            }
        });

        // Add image preview listener
        document.getElementById('imageInput').addEventListener('change', updateImagePreview);

        // Drag and Drop implementation
        const imageDropZone = document.getElementById('imageDropZone');

        ['dragover', 'dragenter'].forEach(eventName => {
            imageDropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                imageDropZone.classList.add('bg-blue-100', 'border-blue-500');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            imageDropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                imageDropZone.classList.remove('bg-blue-100', 'border-blue-500');
            }, false);
        });

        imageDropZone.addEventListener('drop', (e) => {
            document.getElementById('imageInput').files = e.dataTransfer.files;
            updateImagePreview();
        }, false);

        function unitToCm(value, unit) {
            if (unit === 'm') return value * 100;
            if (unit === 'ft') return value * 30.48;
            return value;
        }

        function cmToUnit(cm, unit) {
            if (unit === 'm') return cm / 100;
            if (unit === 'ft') return cm / 30.48;
            return cm;
        }

        function updateImagePreview() {
            const fileInput = document.getElementById('imageInput');
            const previewContainer = document.getElementById('imagePreviewContainer');
            const previewImg = document.getElementById('imagePreview');

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                previewContainer.classList.add('hidden');
                previewImg.src = '';
            }
        }

        function clearImagePreview() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('imagePreview').src = '';
        }

        function addCharacter() {
            const name = document.getElementById('nameInput').value || 'ไม่มีชื่อ';
            const rawVal = parseFloat(document.getElementById('heightValue').value);
            const unit = document.getElementById('heightUnit').value;
            const imgFile = document.getElementById('imageInput').files[0];
            
            if (isNaN(rawVal)) return;

            const heightCm = unitToCm(rawVal, unit);
            const id = Date.now();

            const newChar = {
                id: id,
                name: name,
                height: heightCm,      // Actual character height (constant unless edited)
                compHeight: heightCm,  // Adjustable line level during compare mode
                adjustStartHeight: heightCm,
                imageOffset: 0,        // Crop offset for top blank space (cm)
                positionOffsetY: 0,    // Y position offset (can go below 0 cm)
                positionOffsetX: 0,    // X position offset (left/right)
                customWidthCm: null,   // เริ่มต้นเป็น null เพื่อไม่ให้เกิดการครอบภาพอัตโนมัติ
                leftCropCm: 0,
                order: characters.length,
                lineColor: '#ef4444',  // Default red
                lineOnTop: true,       // Default line is in front
                visible: true,
                comparing: false,
                isAdjusting: false,
                isPositioning: false,  // New: position adjustment mode
                image: null
            };

            if (imgFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    newChar.image = e.target.result;
                    characters.push(newChar);
                    updateUI();
                    saveToIndexDB();
                };
                reader.readAsDataURL(imgFile);
            } else {
                characters.push(newChar);
                updateUI();
                saveToIndexDB();
            }

            document.getElementById('nameInput').value = '';
            document.getElementById('imageInput').value = '';
        }

        function openEditModal(id) {
            const char = characters.find(c => c.id === id);
            if (!char) return;
            editingId = id;
            
            document.getElementById('editName').value = char.name;
            // Show height in current display unit
            document.getElementById('editHeight').value = cmToUnit(char.height, currentDisplayUnit).toFixed(currentDisplayUnit === 'm' ? 2 : 1);
            document.getElementById('editLineColor').value = char.lineColor;
            
            document.querySelectorAll('.current-unit-text').forEach(el => el.textContent = currentDisplayUnit);
            
            // Show current image preview in modal
            const previewContainer = document.getElementById('modalImgPreviewContainer');
            if (char.image) {
                previewContainer.innerHTML = `<img src="${char.image}" class="edit-preview-img">`;
            } else {
                previewContainer.innerHTML = `
                    <div class="edit-preview-img flex items-center justify-center text-gray-400 text-xs text-center p-4">
                        ${translations[currentLanguage].noImage}
                    </div>
                `;
            }
            
            document.getElementById('editImageInput').value = '';
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingId = null;
        }

        function updateColorPreview() {
            const color = document.getElementById('editLineColor').value;
            const preview = document.getElementById('colorPreview');
            preview.style.backgroundColor = color;
        }

        async function saveEdit() {
            const char = characters.find(c => c.id === editingId);
            if (!char) return;

            char.name = document.getElementById('editName').value;
            const newVal = parseFloat(document.getElementById('editHeight').value);
            
            // Convert input back to CM for storage
            const newHeight = unitToCm(newVal, currentDisplayUnit);
            
            // อัปเดตส่วนสูงและปรับเส้นเปรียบเทียบให้ตรงกับส่วนสูงใหม่โดยอัตโนมัติ
            char.height = newHeight;
            char.compHeight = newHeight;
            char.lineColor = document.getElementById('editLineColor').value;

            // Handle image change
            const imgFile = document.getElementById('editImageInput').files[0];
            if (imgFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    char.image = e.target.result;
                    finishEditUpdate();
                };
                reader.readAsDataURL(imgFile);
            } else {
                finishEditUpdate();
            }
        }

        function finishEditUpdate() {
            closeEditModal();
            updateUI();
            saveToIndexDB();
        }

        function toggleComparing(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.comparing = !char.comparing;
                if (!char.comparing) {
                    char.isAdjusting = false;
                    char.adjustStartHeight = char.height;
                }
                char.isPositioning = false; // Exit positioning mode when toggling compare
            }
            updateUI();
            saveToIndexDB();
        }

        function toggleAllComparing(enable) {
            characters.forEach(char => {
                char.comparing = enable;
                if (!enable) char.isAdjusting = false;
            });
            updateUI();
            saveToIndexDB();
        }

        function toggleAllLineOrder(onTop) {
            characters.forEach(char => {
                char.lineOnTop = onTop;
            });
            updateUI();
            saveToIndexDB();
        }

        function toggleLineOrder(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.lineOnTop = char.lineOnTop === undefined ? false : !char.lineOnTop;
            }
            updateUI();
            saveToIndexDB();
        }

        function toggleAllLineOrder(onTop) {
            characters.forEach(char => {
                char.lineOnTop = onTop;
            });
            updateUI();
            saveToIndexDB();
        }

        function toggleAdjustMode(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                if (!char.isAdjusting) {
                    // เริ่มโหมดปรับเส้น: ดึงส่วนสูงจริง (height) มาเป็นจุดเริ่มเพื่อให้ผู้ใช้เห็นตัวเลขที่คุ้นเคย
                    char.compHeight = char.height; 
                    char.adjustStartHeight = char.height;
                    char.originalImageOffset = char.imageOffset || 0;
                    char.isAdjusting = true;
                    characters.forEach(c => { if(c.id !== id) c.isAdjusting = false; });
                } else {
                    // กดยืนยัน: คำนวณส่วนต่างเพื่อปรับ imageOffset (การ Crop)
                    const chart = document.getElementById('chart');
                    const baseHeight = 710;
                    const pxPerCm = (baseHeight * currentZoom) / maxDisplayHeight;
                    const bufferCm = 1 / pxPerCm; // เผื่อขอบ 1px

                    // ส่วนต่างที่ต้อง Crop เพิ่ม = (ส่วนสูงเป้าหมาย) - (ระดับเส้นที่ผู้ใช้เล็งที่หัวจริง ๆ ในภาพ)
                    const additionalCrop = char.height - char.compHeight;
                    char.imageOffset = Math.max(0, (char.imageOffset || 0) + additionalCrop - bufferCm);
                    
                    // รีเซ็ตเส้นกลับไปที่ระดับส่วนสูงจริงของตัวละครเพื่อให้หัวพอดีกับเลขส่วนสูงบนไม้บรรทัด
                    char.compHeight = char.height;

                    char.isAdjusting = false;
                    delete char.originalImageOffset;
                    saveToIndexDB();
                }
            }
            updateUI();
        }

        function cancelAdjust(id) {
            const char = characters.find(c => c.id === id);
            if (!char) return;
            // Restore backup values
            char.compHeight = char.adjustStartHeight;
            char.imageOffset = char.originalImageOffset;
            char.isAdjusting = false;
            delete char.originalImageOffset;
            updateUI();
        }

        function addExtraLine(height) {
            extraLines.push({
                id: Date.now(),
                height: height,
                color: '#3b82f6',
                onTop: true
            });
            saveToIndexDB();
            renderChart();
        }

        function removeExtraLine(id) {
            extraLines = extraLines.filter(l => l.id !== id);
            saveToIndexDB();
            renderChart();
        }

        function startAdjustingExtra(e, id) {
            isDraggingExtra = true;
            dragLineId = id;
            e.preventDefault();
        }

        function toggleExtraLineOrder(id) {
            const line = extraLines.find(l => l.id === id);
            if (line) {
                line.onTop = !line.onTop;
                saveToIndexDB();
                renderChart();
            }
        }

        function changeExtraLineColor(id, color) {
            const line = extraLines.find(l => l.id === id);
            if (line) {
                line.color = color;
                saveToIndexDB();
                renderChart();
            }
        }

        function showLineContextMenu(e, lineId) {
            e.preventDefault();
            e.stopPropagation();
            const line = extraLines.find(l => l.id === lineId);
            if (!line) return;

            const existing = document.getElementById('contextMenu');
            if (existing) existing.remove();

            const menu = document.createElement('div');
            menu.id = 'contextMenu';
            menu.className = 'context-menu';

            // ตรวจสอบพิกัดเมาส์หรือทัช เพื่อป้องกันเมนูกระโดดไปซ้ายบน (0,0)
            const x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);

            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            const t = translations[currentLanguage];
            menu.innerHTML = `
                <button onclick="toggleExtraLineOrder(${lineId})">
                    ${line.onTop ? t.lineBehind : t.lineOnTop}
                </button>
                <div style="padding: 8px 14px; border-top: 1px solid var(--border-color);">
                    <div style="font-size: 11px; font-weight: bold; color: var(--text-main); margin-bottom: 5px;">${t.lineColor}</div>
                    <input type="color" value="${line.color}" onchange="changeExtraLineColor(${lineId}, this.value)" style="width: 100%; height: 30px; cursor: pointer; background: transparent; border: none; padding: 0;">
                </div>
                <hr style="opacity: 0.1; margin: 4px 0;">
                <button onclick="removeExtraLine(${lineId})" style="color: #ef4444;">🗑️ ${t.delete}</button>
            `;

            document.body.appendChild(menu);
            setTimeout(() => {
                document.addEventListener('click', closeContextMenu);
            }, 0);
        }

        function toggleVisibility(id) {
            const char = characters.find(c => c.id === id);
            if (char) char.visible = !char.visible;
            updateUI();
            saveToIndexDB();
        }

        function removeCharacter(id) {
            characters = characters.filter(c => c.id !== id);
            updateUI();
            saveToIndexDB();
        }

        function resetCharacterLayout(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.compHeight = char.height;
                char.imageOffset = 0;
                char.positionOffsetY = 0;
                char.positionOffsetX = 0;
                char.customWidthCm = null;
                char.leftCropCm = 0;
                char.isPositioning = false;
                char.isAdjusting = false;
                char.comparing = false;
                delete char.originalPos;
                updateUI();
                saveToIndexDB();
            }
        }

        function togglePositioning(id) {
            // Prevent positioning mode during comparing mode
            const char = characters.find(c => c.id === id);
            if (char && char.comparing) {
                alert(translations[currentLanguage].disablePos);
                return;
            }

            if (char) {
                if (!char.isPositioning) {
                    // Backup values for Cancel
                    char.originalPos = {
                        offsetX: char.positionOffsetX || 0,
                        offsetY: char.positionOffsetY || 0,
                        widthCm: char.customWidthCm, // Backup current width (could be null)
                        leftCropCm: char.leftCropCm || 0
                    };
                    char.isPositioning = true;
                    activeZIndexId = id;
                } else {
                    char.isPositioning = false;
                    delete char.originalPos;
                }
                // Disable other positioning modes
                characters.forEach(c => { 
                    if (c.id !== id) c.isPositioning = false; 
                });
            }
            updateUI();
        }

        function confirmPositioning(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.isPositioning = false;
                delete char.originalPos;
                updateUI();
                saveToIndexDB();
            }
        }

        function cancelPositioning(id) {
            const char = characters.find(c => c.id === id);
            if (char && char.originalPos) {
                char.positionOffsetX = char.originalPos.offsetX;
                char.positionOffsetY = char.originalPos.offsetY;
                char.customWidthCm = char.originalPos.widthCm;
                char.leftCropCm = char.originalPos.leftCropCm;
                char.isPositioning = false;
                delete char.originalPos;
                updateUI();
            }
        }

        let contextMenuId = null;
        function showContextMenu(e, charId) {
            e.preventDefault();
            contextMenuId = charId;
            activeZIndexId = charId;

            // Remove existing context menu
            const existing = document.getElementById('contextMenu');
            if (existing) existing.remove();

            const menu = document.createElement('div');
            menu.id = 'contextMenu';
            menu.className = 'context-menu';

            // ตรวจสอบพิกัดเมาส์หรือทัช
            const x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);

            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            const char = characters.find(c => c.id === charId);
            const t = translations[currentLanguage];
            
            if (!char) return;

            // Check active states for highlighting in the menu
            const posActive = char.isPositioning ? 'active-mode' : '';
            const compActive = char.comparing ? 'active-mode' : '';
            const adjustActive = char.isAdjusting ? 'active-mode' : '';

            let menuHTML = `
                <button onclick="togglePositioning(${charId})" class="${posActive}">
                    ${char.isPositioning ? t.disablePosMode : t.enablePosMode}
                </button>
                <button onclick="toggleComparing(${charId})" class="${compActive}">
                    ${char.comparing ? t.disableCompare : t.enableCompare}
                </button>
                ${char.comparing ? `
                    <button onclick="toggleLineOrder(${charId})">
                        ${char.lineOnTop === false ? t.lineOnTop : t.lineBehind}
                    </button>
                ` : ''}
            `;
            
            // Show adjust line options only when comparing is enabled
            if (char.comparing) {
                if (char.isAdjusting) {
                    menuHTML += `
                        <button onclick="toggleAdjustMode(${charId})" class="${adjustActive}">${t.ok}</button>
                        <button onclick="cancelAdjust(${charId})">${t.cancel}</button>
                    `;
                } else {
                    menuHTML += `
                        <button onclick="toggleAdjustMode(${charId})">${t.adjustLine}</button>
                    `;
                }
            }
            
            menuHTML += `<button onclick="openEditModal(${charId})">${t.edit}</button>`;
            
            menuHTML += `
                <hr style="opacity: 0.1; margin: 4px 0;">
                <button onclick="toggleAllComparing(true)">${t.enableAllCompare}</button>
                <button onclick="toggleAllComparing(false)">${t.disableAllCompare}</button>
                <button onclick="toggleAllLineOrder(true)">${t.allLineOnTop}</button>
                <button onclick="toggleAllLineOrder(false)">${t.allLineBehind}</button>
                <hr style="opacity: 0.1; margin: 4px 0;">
                <button onclick="resetCharacterLayout(${charId})" style="color: #ef4444;">↺ ${t.reset}</button>
            `;

            menu.innerHTML = menuHTML;

            document.body.appendChild(menu);
            renderChart(); // อัปเดตเพื่อให้ตัวละครที่ถูกเลือกขึ้นมาอยู่เลเยอร์บน

            // Close menu when clicking elsewhere
            setTimeout(() => {
                document.addEventListener('click', closeContextMenu);
            }, 0);
        }

        function closeContextMenu(e) {
            const menu = document.getElementById('contextMenu');
            // ป้องกันการปิดเมนูถ้าคลิกโดนกล่องเลือกสี (Input)
            if (menu && e && e.target && menu.contains(e.target)) {
                if (e.target.tagName === 'INPUT') return;
            }

            if (menu) {
                menu.remove();
                document.removeEventListener('click', closeContextMenu);
                contextMenuId = null;
            }
        }

        function updateUI() {
            renderList();
            renderChart();
        }

        function renderList() {
            if (characters.length === 0) {
                listEl.innerHTML = `<p class="text-sm text-gray-400 italic text-center">${translations[currentLanguage].emptyMsg}</p>`;
                return;
            }

            const t = translations[currentLanguage];
            listEl.innerHTML = characters.map(char => `
                <div class="character-list-item p-3 rounded-xl border shadow-sm relative group" data-id="${char.id}">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="drag-handle p-1 hover:bg-gray-100 rounded cursor-grab">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="#9ca3af"><path d="M7 2a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM7 5a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM7 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-3 3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-3 3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg>
                        </div>
                        <input type="checkbox" ${char.visible ? 'checked' : ''} onchange="toggleVisibility(${char.id})" class="h-4 w-4 text-blue-600 rounded-md">
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-bold truncate">${char.name}</div>
                            <div class="text-xs text-gray-400">${cmToUnit(char.height, currentDisplayUnit).toFixed(currentDisplayUnit === 'm' ? 2 : 1)} ${currentDisplayUnit}</div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="openEditModal(${char.id})" class="text-gray-400 hover:text-blue-500 hover:bg-blue-50 p-1.5 rounded-lg transition">
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button onclick="removeCharacter(${char.id})" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-lg transition">
                                <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleComparing(${char.id})" class="flex-1 text-[10px] font-bold py-1.5 rounded-lg border transition ${char.comparing ? 'bg-red-500 text-white border-red-600 shadow-sm' : 'btn-muted-themed'}">
                            ${char.comparing ? t.disableCompare : t.enableCompare}
                        </button>
                        ${char.comparing ? `
                            <button onclick="toggleAdjustMode(${char.id})" class="flex-1 text-[10px] font-bold py-1.5 rounded-lg border transition ${char.isAdjusting ? 'bg-orange-500 text-white border-orange-500 shadow-sm' : 'btn-muted-themed'}">
                                ${char.isAdjusting ? t.ok : t.adjustLine}
                            </button>
                            ${char.isAdjusting ? `<button onclick="cancelAdjust(${char.id})" class="flex-1 text-[10px] font-bold py-1.5 rounded-lg border transition btn-muted-themed">${t.cancel}</button>` : ''}
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderChart() {
            const chart = document.getElementById('chart');
            const yAxis = document.getElementById('yAxis');
            chart.querySelectorAll('.character-item, .grid-line, .comparison-line, .extra-line-control').forEach(el => el.remove());
            yAxis.innerHTML = '';

            const visibleChars = characters.filter(c => c.visible);
            
            // Scalable height based on content
            let currentMax = visibleChars.length > 0 
                ? Math.max(...visibleChars.map(c => Math.max(c.height, c.compHeight))) 
                : 200;

            const threshold = 5; // Number of characters before scaling kicks in
            let scaleMultiplier = 1; // Default scale is 1 (100%)
            if (visibleChars.length > 3 && visibleChars.length <= threshold) { // Scale up to 180% as we approach the threshold
                const minScale = 1;
                const maxScale = 1.2;
                scaleMultiplier = minScale + ((visibleChars.length - 1) / (threshold - 1)) * (maxScale - minScale);
            } else if (visibleChars.length > threshold) {
                scaleMultiplier = 1.2;
            }

            maxDisplayHeight = Math.ceil((currentMax + 40) / 10) * 10 * scaleMultiplier;

            // Show scrollbar only when there are more than the threshold characters
            chart.style.overflowX = visibleChars.length > threshold ? 'auto' : 'hidden'; 

            // คำนวณพื้นที่ใช้งานจริงโดยหักลบ Padding ออก
            const paddingBottom = 30;
            const baseHeight = 710; 
            const containerHeight = baseHeight * currentZoom;
            chart.style.height = (containerHeight + paddingBottom + 40) + 'px';
            const pxPerCm = containerHeight / maxDisplayHeight;

            const getPixelPos = (cm) => (cm * pxPerCm) + paddingBottom;

            // Render Grid & Labels
            for (let h = 0; h <= maxDisplayHeight; h += 10) {
                const bottomPos = getPixelPos(h);
                const isMajor = h % 50 === 0;
                
                if (isMajor || h === 0) {
                    const label = document.createElement('div');
                    label.className = 'y-label';
                    label.style.bottom = `${bottomPos}px`;
                    label.innerText = `${cmToUnit(h, currentDisplayUnit).toFixed(currentDisplayUnit === 'cm' ? 0 : 1)} ${currentDisplayUnit}`;
                    yAxis.appendChild(label);
                }
                
                if (h >= 0) { // เริ่มที่ 0 เพื่อให้มีเส้นฐาน 0 cm
                    const line = document.createElement('div');
                    line.className = 'grid-line' + (isMajor ? ' major' : '');
                    line.style.bottom = `${bottomPos}px`;
                    chart.appendChild(line);
                }
            }

            // Add Line Button on Y-Axis
            const addBtn = document.createElement('div');
            addBtn.id = 'yAxisAddBtn';
            addBtn.className = 'add-line-btn';
            addBtn.innerHTML = '+';
            yAxis.appendChild(addBtn);

            yAxis.onmousemove = (e) => {
                const rect = yAxis.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const safeY = Math.max(0, Math.min(y, rect.height - 30));
                addBtn.style.top = safeY + 'px';
                
                const containerHeight = 710 * currentZoom;
                const pxPerCm = containerHeight / maxDisplayHeight;
                addBtn.dataset.height = ((rect.height - 30) - safeY) / pxPerCm;
            };

            addBtn.onclick = (e) => {
                e.stopPropagation();
                addExtraLine(parseFloat(addBtn.dataset.height));
            };

            // Render Comparison Lines (Z-index 60)
            visibleChars.filter(c => c.comparing).forEach(char => {
                const line = document.createElement('div');
                line.className = 'comparison-line' + (char.isAdjusting ? ' adjustable adjusting' : '');
                line.style.bottom = `${getPixelPos(char.compHeight)}px`;
                line.style.color = char.lineColor;
                line.style.borderColor = char.lineColor;
                line.style.zIndex = char.lineOnTop === false ? '5' : '110';
                
                // Label shows Level of Line, not constant height
                line.innerHTML = `
                    <div class="comparison-label" style="background-color: ${char.lineColor}">
                        ${char.name}: <span>${cmToUnit(char.compHeight, currentDisplayUnit).toFixed(currentDisplayUnit === 'm' ? 2 : 1)} ${currentDisplayUnit}</span>
                    </div>
                `;
                
                if (char.isAdjusting) {
                    line.addEventListener('mousedown', (e) => startAdjusting(e, char.id));
                    line.addEventListener('touchstart', (e) => startAdjusting(e, char.id), {passive: false});
                }

                chart.appendChild(line);
            });

            // Render Extra Comparison Lines
            extraLines.forEach(line => {
                const bottomPos = `${getPixelPos(line.height)}px`;

                // 1. The visual line (can be behind or in front)
                const lineEl = document.createElement('div');
                lineEl.className = 'comparison-line extra-line adjustable';
                lineEl.style.bottom = bottomPos;
                lineEl.style.color = line.color;
                lineEl.style.borderColor = line.color;
                lineEl.style.zIndex = line.onTop ? '115' : '5';
                
                lineEl.addEventListener('mousedown', (e) => startAdjustingExtra(e, line.id));
                lineEl.addEventListener('touchstart', (e) => startAdjustingExtra(e, line.id), {passive: false});
                lineEl.oncontextmenu = (e) => showLineContextMenu(e, line.id);
                chart.appendChild(lineEl);

                // 2. The controls (Label + Delete button) - Always on top of Y-axis
                const controlEl = document.createElement('div');
                controlEl.className = 'extra-line-control';
                controlEl.style.position = 'absolute';
                controlEl.style.bottom = bottomPos;
                controlEl.style.left = '0';
                controlEl.style.right = '0';
                controlEl.style.height = '0';
                controlEl.style.zIndex = '120';
                controlEl.style.pointerEvents = 'none';

                controlEl.innerHTML = `
                    <div class="comparison-label" style="background-color: ${line.color}; left: 70px; pointer-events: auto;">
                        <span>${cmToUnit(line.height, currentDisplayUnit).toFixed(currentDisplayUnit === 'm' ? 2 : 1)} ${currentDisplayUnit}</span>
                    </div>
                    <div class="delete-line-btn" onclick="removeExtraLine(${line.id})" title="Delete Line" style="pointer-events: auto;">
                        <div style="background: ${line.color}">✕</div>
                    </div>
                `;
                chart.appendChild(controlEl);
            });

            // Render Characters (In array order)
            visibleChars.forEach(char => {
                const charEl = document.createElement('div');
                charEl.className = 'character-item' + (char.isPositioning ? ' positioning' : '');
                charEl.dataset.id = char.id;
                
                const paddingBottom = 30;
                const baseHeight = 710; 
                const containerHeight = baseHeight * currentZoom;
                const pxPerCm = containerHeight / maxDisplayHeight;

                const heightPx = char.height * pxPerCm;
                const widthCm = char.customWidthCm;
                const widthPx = widthCm ? widthCm * pxPerCm : null; 
                const leftCropPx = (char.leftCropCm || 0) * pxPerCm;
                const offsetPx = char.imageOffset * pxPerCm;
                
                const offsetYPx = char.positionOffsetY * pxPerCm;
                const offsetXPx = char.positionOffsetX;

                // กำหนดลำดับเลเยอร์: จัดตำแหน่ง(100) > คลิกปัจจุบัน(90) > ทั่วไป(10)
                const zIndex = char.isPositioning ? 100 : (char.id === activeZIndexId ? 90 : 10);

                // ล็อกพื้นที่ตัวละครข้างๆ ไว้ขณะจัดตำแหน่ง เพื่อไม่ให้เลย์เอาท์ขยับจนกว่าจะยืนยัน
                if (char.isPositioning && char.originalPos) {
                    const layoutWidthCm = char.originalPos.widthCm || (char.height / 2.5);
                    charEl.style.width = (layoutWidthCm * pxPerCm) + 'px';
                }

                charEl.innerHTML = `
                    <div class="label-tag">
                        <span class="name font-bold block">${char.name}</span>
                        <span class="h-val text-[10px] opacity-80">${cmToUnit(char.height, currentDisplayUnit).toFixed(currentDisplayUnit === 'm' ? 2 : 1)} ${currentDisplayUnit}</span>
                        ${char.isPositioning ? `
                            <div class="flex gap-1 mt-1 pointer-events-auto">
                                <button onclick="confirmPositioning(${char.id})" class="bg-green-500 hover:bg-green-600 text-white p-1 rounded transition" title="Confirm">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                                </button>
                                <button onclick="cancelPositioning(${char.id})" class="bg-red-500 hover:bg-red-600 text-white p-1 rounded transition" title="Cancel">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="character-img-wrapper" onclick="activeZIndexId = ${char.id}; renderChart();" style="${widthPx ? `width: ${widthPx}px;` : ''} height: ${heightPx + offsetPx}px; overflow: visible; align-items: flex-start; justify-content: flex-start; transform: translateY(${offsetYPx}px) translateX(${offsetXPx}px); z-index: ${zIndex};" oncontextmenu="showContextMenu(event, ${char.id})">
                        ${char.image ? `<img src="${char.image}" class="character-img" style="height: ${heightPx + offsetPx}px; margin-top: 0px; margin-left: -${leftCropPx}px; pointer-events: ${char.isPositioning ? 'none' : 'auto'}; display: block; max-width: none;">` : `<div class="character-placeholder" style="height: ${heightPx}px; width: ${widthPx || (char.height / 2.5) * pxPerCm}px; border-radius: ${heightPx/5}px ${heightPx/5}px 0 0; background-color: rgba(59, 130, 246, 0.4); border: 2px solid #3b82f6;"></div>`}
                        ${char.isPositioning ? `
                            <div class="resize-handle left" onmousedown="startResizing(event, ${char.id}, 'left')" ontouchstart="startResizing(event, ${char.id}, 'left')"></div>
                            <div class="resize-handle right" onmousedown="startResizing(event, ${char.id}, 'right')" ontouchstart="startResizing(event, ${char.id}, 'right')"></div>
                        ` : ''}
                    </div>
                `;

                // Add drag event listeners for positioning mode
                if (char.isPositioning) {
                    const imgWrapper = charEl.querySelector('.character-img-wrapper');
                    imgWrapper.addEventListener('mousedown', (e) => startPositioningDrag(e, char.id));
                    imgWrapper.addEventListener('touchstart', (e) => startPositioningDrag(e, char.id), {passive: false});
                }

                chart.appendChild(charEl);
            });

            // ปรับความยาวของเส้นตารางและเส้นเปรียบเทียบให้เท่ากับเนื้อหาจริง (ไม่ยาวเกินไป)
            const fullWidth = chart.scrollWidth;
            const lineTargetWidth = Math.max(chart.clientWidth, fullWidth) - 70;
            chart.querySelectorAll('.grid-line, .comparison-line').forEach(line => {
                line.style.width = `${lineTargetWidth}px`;
            });
        }

        // Drag-to-Adjust Logic for Comparison Line
        function startAdjusting(e, id) {
            isDragging = true;
            dragCharId = id;
            e.preventDefault();
        }

        function startResizing(e, id, dir) {
            e.stopPropagation();
            const char = characters.find(c => c.id === id);
            if (!char) return;

            isResizing = true;
            resizeDir = dir;
            dragCharId = id;
            activeZIndexId = id;

            const chart = document.getElementById('chart');
            const baseHeight = 710;
            const pxPerCm = (baseHeight * currentZoom) / maxDisplayHeight;
            
            const wrapperEl = document.querySelector(`.character-item[data-id="${id}"] .character-img-wrapper`);
            startWidthCm = char.customWidthCm || (wrapperEl.offsetWidth / pxPerCm);
            startLeftCropCm = char.leftCropCm || 0;
            startOffsetX = char.positionOffsetX || 0;
            dragStartX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            
            e.preventDefault();
        }

        // Drag-to-Position Logic for Characters
        function startPositioningDrag(e, id) {
            const char = characters.find(c => c.id === id);
            if (!char) return;

            isPositioningDrag = true;
            dragCharId = id;
            activeZIndexId = id;
            
            startOffsetX = char.positionOffsetX || 0;
            startOffsetY = char.positionOffsetY || 0;
            dragStartX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            dragStartY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            e.preventDefault();
        }

        window.addEventListener('mousemove', (e) => handleDrag(e));
        window.addEventListener('touchmove', (e) => handleDrag(e), {passive: false});
        
        const stopDragging = () => {
            if (isDragging || isDraggingExtra || isPositioningDrag || isResizing) {
                saveToIndexDB(); // บันทึกตำแหน่งสุดท้ายลงฐานข้อมูลเมื่อปล่อยมือ
            }
            isDragging = false; isDraggingExtra = false; isPositioningDrag = false; isResizing = false; dragCharId = null; dragLineId = null;
        };
        window.addEventListener('mouseup', stopDragging);
        window.addEventListener('touchend', stopDragging);

        function handleDrag(e) {
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

            // Handle Comparison Line Adjusting
            if ((isDragging && dragCharId !== null) || (isDraggingExtra && dragLineId !== null)) {
                const chart = document.getElementById('chart');
                const rect = chart.getBoundingClientRect();
                
                const baseHeight = 710;
                const pxPerCm = (baseHeight * currentZoom) / maxDisplayHeight;
                // คำนวณความสูงจากเส้น 0cm (ซึ่งอยู่สูงจากขอบล่างของ element 30px)
                let yFromBottom = (rect.bottom - 30) - clientY;
                let newHeightCm = yFromBottom / pxPerCm;

                // Bounds locking
                if (newHeightCm < 0) newHeightCm = 0;
                if (newHeightCm > maxDisplayHeight) newHeightCm = maxDisplayHeight;

                if (isDragging) {
                    const char = characters.find(c => c.id === dragCharId);
                    if (char) {
                        char.compHeight = newHeightCm;
                        renderChart();
                    }
                }

                if (isDraggingExtra) {
                    const line = extraLines.find(l => l.id === dragLineId);
                    if (line) {
                        line.height = newHeightCm;
                        renderChart();
                    }
                }
            }

            // Handle Character Positioning
            if (isPositioningDrag && dragCharId !== null) {
                const deltaX = clientX - dragStartX;
                const deltaY = clientY - dragStartY;

                const baseHeight = 710;
                const pxPerCm = (baseHeight * currentZoom) / maxDisplayHeight;

                const char = characters.find(c => c.id === dragCharId);
                if (char) {
                    char.positionOffsetX = startOffsetX + deltaX;
                    char.positionOffsetY = startOffsetY + (deltaY / pxPerCm);
                    renderChart();
                }
            }

            // Handle Resizing
            if (isResizing && dragCharId !== null) {
                const deltaX = clientX - dragStartX;
                
                const baseHeight = 710;
                const pxPerCm = (baseHeight * currentZoom) / maxDisplayHeight;
                const deltaCm = deltaX / pxPerCm;

                const char = characters.find(c => c.id === dragCharId);
                if (char) {
                    if (resizeDir === 'right') {
                        // ปรับฝั่งขวา: เปลี่ยนเฉพาะความกว้าง
                        char.customWidthCm = Math.max(1, startWidthCm + deltaCm);
                    } else if (resizeDir === 'left') {
                        // ปรับฝั่งซ้าย: ลดความกว้าง + เพิ่ม Crop ซ้าย + ขยับตำแหน่งชดเชยเพื่อให้รูปนิ่ง
                        const newWidthCm = Math.max(1, startWidthCm - deltaCm);
                        const actualDeltaCm = startWidthCm - newWidthCm;
                        char.customWidthCm = newWidthCm;
                        char.leftCropCm = startLeftCropCm + actualDeltaCm;
                        char.positionOffsetX = startOffsetX + (actualDeltaCm * pxPerCm);
                    }
                    renderChart();
                }
            }
        }

        async function downloadImage() {
            const exportArea = document.getElementById('exportArea');
            const chart = document.getElementById('chart');
            
            // สร้าง clone ของ exportArea เพื่อจัดการ
            const clonedExportArea = exportArea.cloneNode(true);
            const controls = clonedExportArea.querySelector('.chart-controls');
            if (controls) controls.remove();
            
            const clonedChart = clonedExportArea.querySelector('#chart');
            
            // ปรับให้ chart clone ไม่ scroll - แสดงทั้งหมด
            clonedChart.style.overflowX = 'visible';
            clonedChart.style.overflowY = 'visible';
            clonedChart.style.whiteSpace = 'normal';
            clonedChart.style.width = 'auto';
            clonedChart.style.minWidth = '100%';
            
            // ซ่อนจากการเห็น
            clonedExportArea.style.position = 'fixed';
            clonedExportArea.style.left = '-9999px';
            clonedExportArea.style.top = '-9999px';
            
            // เพิ่มไปยัง DOM ชั่วคราว
            document.body.appendChild(clonedExportArea);
            
            // รอให้ browser render
            await new Promise(resolve => setTimeout(resolve, 100));
            
            try {
                const canvas = await html2canvas(clonedExportArea, { 
                    scale: 2, 
                    useCORS: true,
                    letterRendering: true,
                    backgroundColor: '#ffffff'
                });
                
                const link = document.createElement('a');
                link.download = `height-comparison-${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } finally {
                // ล้างความวุ่นวายออก
                document.body.removeChild(clonedExportArea);
            }
        }

        // Handle Global Unit Change
        document.getElementById('heightUnit').addEventListener('change', function(e) {
            const newUnit = e.target.value;
            const heightInput = document.getElementById('heightValue');
            const currentVal = parseFloat(heightInput.value);
            
            if (!isNaN(currentVal)) {
                const valInCm = unitToCm(currentVal, lastInputUnit);
                heightInput.value = cmToUnit(valInCm, newUnit).toFixed(newUnit === 'm' ? 2 : 1);
            }
            
            lastInputUnit = newUnit;
            currentDisplayUnit = newUnit;
            updateUI();
        });

        // Initialize and load from IndexedDB
        (async () => {
            try {
                await initDB();
                const savedTheme = await getSetting('theme');
                if (savedTheme) applyTheme(savedTheme);
                await loadFromIndexDB();
                loadLanguagePreference();
            } catch (error) {
                console.error('IndexedDB error:', error);
                updateUI();
            }
        })();
    </script>
</body>
